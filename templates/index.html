<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGame Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="game-container">
        <h1>🌍 Welcome to Conway's Geo Puzzle!</h1>
        <p>Guess the hidden country based on distance and direction hints.</p>
        
        <form id="guessForm">
            <input type="text" id="guessInput" name="guess" placeholder="Enter a country..." autocomplete="off" required>
            <button type="submit">Guess</button>
        </form>

        <div id="results">
            {% if has_won and not submitted %}
                <div id="leaderboard-entry">
                    <h3>GG! Enter your name for the leaderboard:</h3>
                    <input type="text" id="playerName" placeholder="Your Name" maxlength="20">
                    <button onclick="submitScore()">Submit</button>
                </div>
            {% endif %}
        </div>
    </div>

<script>
        // Read the locked status directly from Python when the page loads!
        let hasWon = {{ 'true' if has_won else 'false' }};
        let hasSubmitted = {{ 'true' if submitted else 'false' }};
        let currentGuesses = {{ guesses }}; // Read the guess count!

        // If they already won but haven't submitted, hide the form
        if (hasWon && !hasSubmitted) {
            document.getElementById("guessForm").style.display = "none";
        }

        // If they already submitted their score, show their personal result and the leaderboard
        if (hasSubmitted) {
            document.getElementById("guessForm").style.display = "none";
            showFinalScreen();
        }

        document.getElementById("guessForm").addEventListener("submit", async function(e) {
            e.preventDefault(); 
            if (hasWon) return; 

            // Add to the guess counter locally
            currentGuesses++;

            let formData = new FormData(this);
            let response = await fetch("/guess", { method: "POST", body: formData });
            let data = await response.json();
            
            let resultsDiv = document.getElementById("results");
            let newHint = document.createElement("p");
            newHint.innerText = data.message; 
            resultsDiv.prepend(newHint);

            document.getElementById("guessInput").value = "";
            
            if (data.status === "win") {
                hasWon = true;
                // Hide the form instead of disabling it
                document.getElementById("guessForm").style.display = "none";
                showLeaderboardEntry();
            }
        });

        function showLeaderboardEntry() {
            let resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `
                <div id="leaderboard-entry">
                    <h3>GG! Enter your name for the leaderboard:</h3>
                    <input type="text" id="playerName" placeholder="Your Name" maxlength="20">
                    <button onclick="submitScore()">Submit</button>
                </div>
            ` + resultsDiv.innerHTML;
        }

        // NEW: This builds the final victory screen
        function showFinalScreen() {
            document.getElementById("results").innerHTML = `
                <div style="background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #166534;">
                    <h3 style="margin: 0;">🎉 You found today's country in ${currentGuesses} guesses!</h3>
                    <p style="margin: 5px 0 0 0; font-size: 0.9em;">Come back tomorrow for a new puzzle.</p>
                </div>
                <div id="leaderboard-table"></div>
            `;
            loadLeaderboard();
        }

        async function submitScore() {
            let name = document.getElementById("playerName").value;
            if (!name) return; 

            let formData = new FormData();
            formData.append("name", name);

            let btn = document.querySelector("#leaderboard-entry button");
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                let response = await fetch("/save_score", { method: "POST", body: formData });
                let result = await response.json(); 
                
                if (response.ok && result.status === "success") {
                    hasSubmitted = true;
                    showFinalScreen(); // Switch to the final victory screen!
                } else {
                    alert("Server Error: " + (result.message || "Could not save score."));
                    btn.innerText = "Error";
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Network Error: Could not reach the server.");
                btn.innerText = "Submit";
                btn.disabled = false;
            }
        }

        function escapeHTML(str) {
            let div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        async function loadLeaderboard() {
            try {
                let response = await fetch("/get_leaderboard");
                let scores = await response.json();
                
                let html = "<h3 style='margin-top:0;'>Today's Top 10</h3><table style='width:100%; text-align:left;'><tr><th>Name</th><th>Guesses</th><th>Time</th></tr>";
                scores.forEach(s => {
                    html += `<tr><td>${escapeHTML(s.name)}</td><td>${s.guesses}</td><td>${s.time}s</td></tr>`;
                });
                html += "</table>";
                
                // Inject into the new leaderboard-table div we created in showFinalScreen()
                let targetDiv = document.getElementById("leaderboard-table") || document.getElementById("results");
                targetDiv.innerHTML = html;
            } catch(err) {
                console.error("Leaderboard Error:", err);
                let targetDiv = document.getElementById("leaderboard-table") || document.getElementById("results");
                targetDiv.innerHTML = "<p style='color:red;'>⚠️ Error loading leaderboard.</p>";
            }
        }
    </script>
</body>
</html>
