<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGame Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="game-container">
        <h1>🌍 Welcome to Conway's Geo Puzzle!</h1>
        <p>Guess the hidden country based on distance and direction hints.</p>
        
        <form id="guessForm">
            <input type="text" id="guessInput" name="guess" placeholder="Enter a country..." autocomplete="off" required>
            <button type="submit">Guess</button>
        </form>

        <div id="results">
            {% if has_won and not submitted %}
                <div id="leaderboard-entry">
                    <h3>GG! Enter your name for the leaderboard:</h3>
                    <input type="text" id="playerName" placeholder="Your Name" maxlength="20">
                    <button onclick="submitScore()">Submit</button>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Read the locked status directly from Python when the page loads!
        let hasWon = {{ 'true' if has_won else 'false' }};
        let hasSubmitted = {{ 'true' if submitted else 'false' }};

        // If they already won, disable the typing box immediately
        if (hasWon) {
            let inputField = document.getElementById("guessInput");
            inputField.disabled = true;
            inputField.placeholder = "Come back tomorrow!";
        }

        // If they already submitted their score, show the leaderboard immediately
        if (hasSubmitted) {
            loadLeaderboard();
        }

        document.getElementById("guessForm").addEventListener("submit", async function(e) {
            e.preventDefault(); 
            if (hasWon) return; // Extra check to stop guessing after win

            let formData = new FormData(this);
            let response = await fetch("/guess", { method: "POST", body: formData });
            let data = await response.json();
            
            let resultsDiv = document.getElementById("results");
            let newHint = document.createElement("p");
            
            // SECURITY FIX 1: Use innerText instead of innerHTML so if a user 
            // types an HTML tag as their guess, it doesn't break the page.
            newHint.innerText = data.message; 
            
            resultsDiv.prepend(newHint);

            document.getElementById("guessInput").value = "";
            
            if (data.status === "win") {
                hasWon = true;
                let inputField = document.getElementById("guessInput");
                inputField.disabled = true;
                inputField.placeholder = "Come back tomorrow!";
                showLeaderboardEntry();
            }
        });

        function showLeaderboardEntry() {
            let resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `
                <div id="leaderboard-entry">
                    <h3>GG! Enter your name for the leaderboard:</h3>
                    <input type="text" id="playerName" placeholder="Your Name" maxlength="20">
                    <button onclick="submitScore()">Submit</button>
                </div>
            ` + resultsDiv.innerHTML;
        }

        async function submitScore() {
            let name = document.getElementById("playerName").value;
            if (!name) return; // Prevent empty names

            let formData = new FormData();
            formData.append("name", name);

            let btn = document.querySelector("#leaderboard-entry button");
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                let response = await fetch("/save_score", { method: "POST", body: formData });
                
                if (response.ok) {
                    hasSubmitted = true;
                    loadLeaderboard();
                } else {
                    alert("Server Error: Could not save score.");
                    btn.innerText = "Error";
                }
            } catch (err) {
                alert("Network Error: Could not reach the server.");
                btn.innerText = "Submit";
                btn.disabled = false;
            }
        }

        // SECURITY FIX 2: A quick helper function to strip malicious code out of names
        function escapeHTML(str) {
            let div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        async function loadLeaderboard() {
            let response = await fetch("/get_leaderboard");
            let scores = await response.json();
            
            let html = "<h3>Today's Top 10</h3><table style='width:100%'><tr><th>Name</th><th>Guesses</th><th>Time</th></tr>";
            scores.forEach(s => {
                // We wrap s.name in our new escapeHTML function here!
                html += `<tr><td>${escapeHTML(s.name)}</td><td>${s.guesses}</td><td>${s.time}s</td></tr>`;
            });
            html += "</table>";
            
            document.getElementById("results").innerHTML = html;
        }
    </script>
</body>
</html>
