<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGame Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="game-container">
        <h1>🌍 Welcome to Conway's Geo Puzzle!</h1>
        <p>Guess the hidden country based on distance and direction hints.</p>
        
        <form id="guessForm">
            <input type="text" id="guessInput" name="guess" placeholder="Enter a country..." autocomplete="off" required>
            <button type="submit">Guess</button>
        </form>

        <div id="results">
            </div>
    </div>

    <script>
        // This JavaScript stops the page from reloading and talks to app.py
        document.getElementById("guessForm").addEventListener("submit", async function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            let response = await fetch("/guess", { method: "POST", body: formData });
            let data = await response.json();
            
            let resultsDiv = document.getElementById("results");
            let newHint = document.createElement("p");
            newHint.innerHTML = data.message;
            resultsDiv.prepend(newHint);

            document.getElementById("guessInput").value = "";
            
            if (data.status === "win") {
                document.getElementById("guessInput").disabled = true;
                showLeaderboardEntry();
            }
        });

        function showLeaderboardEntry() {
            let resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `
                <div id="leaderboard-entry">
                    <h3>GG! Enter your name for the leaderboard:</h3>
                    <input type="text" id="playerName" placeholder="Your Name">
                    <button onclick="submitScore()">Submit</button>
                </div>
            ` + resultsDiv.innerHTML;
        }

        async function submitScore() {
            let name = document.getElementById("playerName").value;
            let formData = new FormData();
            formData.append("name", name);

            await fetch("/save_score", { method: "POST", body: formData });
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            let response = await fetch("/get_leaderboard");
            let scores = await response.json();
            
            let html = "<h3>Today's Top 10</h3><table style='width:100%'><tr><th>Name</th><th>Guesses</th><th>Time</th></tr>";
            scores.forEach(s => {
                html += `<tr><td>${s.name}</td><td>${s.guesses}</td><td>${s.time}s</td></tr>`;
            });
            html += "</table>";
            
            document.getElementById("results").innerHTML = html;
        };
    </script>
</body>
</html>
